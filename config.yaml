# Public ShellCrash / Clash Meta config.
# Keep subscriptions, proxy nodes, controller secrets and tokens outside this repo.

mixed-port: 7890
redir-port: 7892
tproxy-port: 7893
allow-lan: true
mode: rule
log-level: info
ipv6: true

# Public-safe default. If you need LAN dashboard access, set a real secret in a
# local/private config before changing this to :9999 or 0.0.0.0:9999.
external-controller: 127.0.0.1:9999
external-ui: ui
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip"

tun:
  enable: true
  stack: system
  device: utun
  auto-route: false
  auto-detect-interface: false

experimental:
  ignore-resolve-fail: true
  interface-name: en0

find-process-mode: "off"
routing-mark: 7894
unified-delay: true
use-system-hosts: true

profile:
  store-selected: true
  store-fake-ip: true

geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24

hosts:
  "time.android.com": 203.107.6.88
  "time.facebook.com": 203.107.6.88
  "services.googleapis.cn": services.googleapis.com
  "localhost": 127.0.0.1

dns:
  enable: true
  listen: :1053
  use-hosts: true
  ipv6: true
  default-nameserver:
    - 223.5.5.5
    - 2400:3200::1
  direct-nameserver:
    - 127.0.0.1
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.0/8
  fake-ip-range6: fc00::/16
  respect-rules: true
  nameserver-policy:
    "rule-set:cn":
      - 127.0.0.1
  proxy-server-nameserver:
    - 223.5.5.5
    - 2400:3200::1
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
