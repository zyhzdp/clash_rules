proxy-providers:
  # This file is intentionally ignored by git.
  # Copy templates/private-providers.example.yaml to private/proxy-providers.yaml
  # and fill your own subscription URL or local proxy nodes there.
  airport:
    type: file
    path: ./private/proxy-providers.yaml
    health-check:
      enable: true
      interval: 600
      url: https://www.gstatic.com/generate_204

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - Auto
      - DIRECT
    use:
      - airport

  - name: Auto
    type: url-test
    use:
      - airport
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 80

  - name: OpenAI
    type: select
    proxies:
      - Proxy
      - Auto
      - DIRECT
      - REJECT
    use:
      - airport

  - name: AI
    type: select
    proxies:
      - OpenAI
      - Proxy
      - Auto
      - DIRECT
      - REJECT
    use:
      - airport

  - name: Google
    type: select
    proxies:
      - Proxy
      - Auto
      - DIRECT
      - REJECT
    use:
      - airport

  - name: GitHub
    type: select
    proxies:
      - Proxy
      - Auto
      - DIRECT
      - REJECT
    use:
      - airport

  - name: Final
    type: select
    proxies:
      - Proxy
      - Auto
      - DIRECT

rule-providers:
  lan:
    type: file
    behavior: classical
    format: yaml
    path: ./providers/rules/lan.yaml

  china-direct:
    type: file
    behavior: classical
    format: yaml
    path: ./providers/rules/china-direct.yaml

  openai:
    type: file
    behavior: classical
    format: yaml
    path: ./providers/rules/openai.yaml

  ai:
    type: file
    behavior: classical
    format: yaml
    path: ./providers/rules/ai.yaml

  google:
    type: file
    behavior: classical
    format: yaml
    path: ./providers/rules/google.yaml

  github:
    type: file
    behavior: classical
    format: yaml
    path: ./providers/rules/github.yaml

  direct:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt
    path: ./ruleset/direct.txt
    interval: 86400

  proxy:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/proxy.txt
    path: ./ruleset/proxy.txt
    interval: 86400

  gfw:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt
    path: ./ruleset/gfw.txt
    interval: 86400

  cn:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/cn.mrs
    url: https://testingcf.jsdelivr.net/gh/juewuy/ShellCrash@update/bin/geodata/mrs_geosite_cn.mrs
    interval: 86400

rules:
  # LAN and domestic traffic first.
  - RULE-SET,lan,DIRECT
  - RULE-SET,china-direct,DIRECT
  - RULE-SET,direct,DIRECT

  # Disable QUIC. This keeps Google/YouTube traffic on TCP/TLS instead of UDP/443.
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT

  # Special routing.
  - RULE-SET,openai,OpenAI
  - RULE-SET,ai,AI
  - RULE-SET,google,Google
  - RULE-SET,github,GitHub

  # Community proxy rules.
  - RULE-SET,gfw,Proxy
  - RULE-SET,proxy,Proxy

  # China fallback.
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT,no-resolve

  # Everything else.
  - MATCH,Final
